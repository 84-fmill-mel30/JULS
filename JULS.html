<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JULS — DATESEG MX</title>
<style>
:root {
    --bg:#0b0f1e; --bg2:#131929; --bg3:#1a2240;
    --orange:#ff6b00; --purple:#9b59f7; --cyan:#00d4ff;
    --txt:#e0eaff; --txtD:#7890b8; --bdr:#1e3058;
    --green:#059669; --red:#e63946;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:Arial,sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

.header{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.juls-logo{width:44px;height:44px;border-radius:12px;background:#0d1530;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--orange);}
.header-info{flex:1;}
.header-name{font-size:18px;font-weight:800;color:var(--orange);}
.header-sub{font-size:11px;color:var(--txtD);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}

.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;color:var(--txtD);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:2px solid transparent;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}

.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.panel.active{display:flex;}

/* CHAT */
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#1a2f5e,#1e3a7a);border:1px solid #2a4a9a;}
.msg.bot{align-self:flex-start;background:var(--bg3);border:1px solid var(--bdr);}
.msg.bot .bot-name{font-size:10px;color:var(--orange);font-weight:800;margin-bottom:4px;}
.typing span{width:6px;height:6px;background:var(--orange);border-radius:50%;display:inline-block;margin:0 2px;animation:bounce 1s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.input-bar{background:var(--bg2);border-top:1px solid var(--bdr);padding:10px 12px;display:flex;gap:8px;align-items:center;}
.chat-in{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;color:var(--txt);font-size:13px;}
.chat-in:focus{outline:none;border-color:var(--orange);}
.btn-mic{width:40px;height:40px;border-radius:50%;border:none;background:var(--bg3);color:var(--txtD);font-size:18px;cursor:pointer;}
.btn-mic.on{background:rgba(230,57,70,.2);color:var(--red);animation:mic-pulse 1s infinite;}
@keyframes mic-pulse{50%{box-shadow:0 0 0 6px rgba(230,57,70,.15)}}
.btn-send{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--orange),#ff9500);color:#fff;font-size:18px;cursor:pointer;}

/* VOZ */
.voice-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px 20px;text-align:center;}
.orb{width:130px;height:130px;border-radius:50%;border:3px solid var(--orange);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;background:radial-gradient(circle,#1a2f5e,#0b0f1e);}
.orb.listen{border-color:var(--red);box-shadow:0 0 0 14px rgba(230,57,70,.1);animation:orb-p 1.5s infinite;}
.orb.speak{border-color:var(--green);box-shadow:0 0 0 14px rgba(5,150,105,.1);}
@keyframes orb-p{50%{transform:scale(1.05)}}
.orb-icon{font-size:52px;}
.orb-status{font-size:16px;font-weight:700;}
.orb-txt{font-size:12px;color:var(--txtD);max-width:260px;line-height:1.5;min-height:36px;}
.orb-resp{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px;font-size:13px;line-height:1.5;max-width:300px;display:none;}
.orb-resp.show{display:block;}

/* TRADUCTOR */
.trans-wrap{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.lang-row{display:flex;align-items:center;gap:10px;}
.lang-lbl{flex:1;text-align:center;padding:8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-weight:700;color:var(--orange);}
.swap-btn{font-size:20px;cursor:pointer;}
textarea{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:13px;padding:12px;resize:none;font-family:inherit;width:100%;}
textarea:focus{outline:none;border-color:var(--orange);}
.btn-action{padding:13px;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;width:100%;}
.btn-trans{background:linear-gradient(135deg,var(--orange),#ff9500);}
.btn-gen{background:linear-gradient(135deg,var(--purple),#7b2ff7);}
.result{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:14px;font-size:13px;line-height:1.5;min-height:50px;}

/* WEB GEN */
.gen-wrap{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.code-result{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:14px;font-size:11px;font-family:monospace;line-height:1.5;overflow-x:auto;white-space:pre-wrap;display:none;max-height:300px;overflow-y:auto;}
.code-result.show{display:block;}
.btn-copy{padding:10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:12px;cursor:pointer;display:none;width:100%;}
.btn-copy.show{display:block;}

/* FRAUDE */
.fraud-wrap{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px;}
.card-title{font-size:13px;font-weight:800;color:var(--orange);margin-bottom:12px;}
.fraud-in{padding:10px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg3);color:var(--txt);font-size:14px;width:100%;margin-bottom:10px;}
.btn-fraud{background:linear-gradient(135deg,var(--red),#ff4d6a);padding:13px;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;width:100%;}
.fraud-res{border-radius:8px;padding:14px;font-size:12px;line-height:1.6;margin-top:10px;display:none;}
.fraud-res.show{display:block;}
.safe{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.3);color:#34d399;}
.warn{background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);color:#ff9500;}
.danger{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#ff6b7a;}
.hist-item{background:var(--bg3);border-radius:6px;padding:8px 12px;font-size:11px;margin-bottom:6px;display:flex;justify-content:space-between;}
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="juls-logo">👑</div>
        <div class="header-info">
            <div class="header-name">JULS</div>
            <div class="header-sub">DATESEG MX • Para mi hija Juls 💜</div>
        </div>
        <div class="status-dot"></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('chat',this)">💬 Chat</button>
        <button class="tab" onclick="switchTab('voice',this)">🎤 Voz</button>
        <button class="tab" onclick="switchTab('trans',this)">🌐 Trans</button>
        <button class="tab" onclick="switchTab('gen',this)">🔨 Web</button>
        <button class="tab" onclick="switchTab('fraud',this)">🚨 Fraude</button>
    </div>

    <div class="content">

        <!-- CHAT -->
        <div class="panel active" id="chatPanel">
            <div class="messages" id="msgs">
                <div class="msg bot">
                    <div class="bot-name">👑 JULS</div>
                    ¡Hola! Soy JULS, tu asistente de DATESEG MX. 💜 ¿En qué te ayudo?
                </div>
            </div>
            <div class="input-bar">
                <button class="btn-mic" id="btnMic" onclick="toggleMic()">🎤</button>
                <input class="chat-in" id="chatIn" placeholder="Escríbele a JULS..." onkeydown="if(event.key==='Enter')send()">
                <button class="btn-send" onclick="send()">➤</button>
            </div>
        </div>

        <!-- VOZ -->
        <div class="panel" id="voicePanel">
            <div class="voice-wrap">
                <div class="orb" id="orb" onclick="toggleOrb()">
                    <div class="orb-icon" id="orbIcon">👑</div>
                </div>
                <div class="orb-status" id="orbStatus">Toca para hablar</div>
                <div class="orb-txt" id="orbTxt"></div>
                <div class="orb-resp" id="orbResp"></div>
            </div>
        </div>

        <!-- TRADUCTOR -->
        <div class="panel" id="transPanel">
            <div class="trans-wrap">
                <div class="lang-row">
                    <div class="lang-lbl" id="lFrom">🇲🇽 Español</div>
                    <div class="swap-btn" onclick="swapLang()">⇄</div>
                    <div class="lang-lbl" id="lTo">🇺🇸 Inglés</div>
                </div>
                <textarea id="transIn" rows="4" placeholder="Texto a traducir..."></textarea>
                <button class="btn-action btn-trans" onclick="translate()">🌐 TRADUCIR</button>
                <div class="result" id="transOut">El resultado aparecerá aquí...</div>
            </div>
        </div>

        <!-- WEB GEN -->
        <div class="panel" id="genPanel">
            <div class="gen-wrap">
                <textarea id="genIn" rows="4" placeholder="Describe la página web que necesitas...&#10;Ej: Landing page para taller mecánico con contacto y servicios"></textarea>
                <button class="btn-action btn-gen" onclick="genWeb()">🔨 GENERAR PÁGINA WEB</button>
                <div class="code-result" id="genOut"></div>
                <button class="btn-copy" id="btnCopy" onclick="copyCode()">📋 Copiar código</button>
            </div>
        </div>

        <!-- FRAUDE -->
        <div class="panel" id="fraudPanel">
            <div class="fraud-wrap">
                <div class="card">
                    <div class="card-title">🚨 Detector Anti-Fraude</div>
                    <input class="fraud-in" id="fraudPhone" type="tel" placeholder="Número: 5512345678">
                    <textarea id="fraudMsg" rows="3" style="margin-bottom:10px" placeholder="Mensaje o texto sospechoso (opcional)..."></textarea>
                    <button class="btn-fraud" onclick="checkFraud()">🔍 ANALIZAR</button>
                    <div class="fraud-res" id="fraudRes"></div>
                </div>
                <div class="card" id="histCard" style="display:none">
                    <div class="card-title">📋 Historial</div>
                    <div id="histList"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// ═══════════════════════════════
//  JULS — DATESEG MX
//  Dedicada a Juls, hija de Fer
// ═══════════════════════════════

const SYSTEM = `Eres JULS, asistente inteligente mexicana creada por DATESEG MX. Tu nombre viene de Juls, hija de Fer Millán. Eres experta en tecnología automotriz, Android, Firebase y diagnóstico OBD2. Hablas español mexicano natural, cálido y profesional. Apoyas a Fer con ProPart V8, OilMaster y todos sus proyectos. Das respuestas directas y útiles. Empresa: DATESEG MX — Sistema de Tecnologías Automotrices, Morelos, México.`;

let history = [];
let recog = null;
let listening = false;
let langFrom = 'es';
let langTo = 'en';
let fraudHist = JSON.parse(localStorage.getItem('juls_fh') || '[]');

// ── Init ──────────────────────────────────────────────
window.addEventListener('load', () => {
    // Speech Recognition
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
        recog = new SR();
        recog.lang = 'es-MX';
        recog.continuous = false;
        recog.interimResults = false;
    }
    loadFraudHist();
});

// ── Tabs ──────────────────────────────────────────────
function switchTab(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name + 'Panel').classList.add('active');
    el.classList.add('active');
}

// ── API JULS ──────────────────────────────────────────
async function askJULS(userMsg, extraCtx = []) {
    const msgs = [...history, ...extraCtx, { role: 'user', content: userMsg }];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            system: SYSTEM,
            messages: msgs
        })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Error API');
    return data.content[0].text;
}

// ── TTS ───────────────────────────────────────────────
function speak(txt) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt.replace(/[*_#`]/g,'').substring(0,250));
    u.lang = 'es-MX';
    u.rate = 1.0;
    u.pitch = 1.1;
    window.speechSynthesis.speak(u);
}

// ── CHAT ──────────────────────────────────────────────
async function send() {
    const inp = document.getElementById('chatIn');
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';
    addMsg(txt, 'user');
    history.push({ role:'user', content: txt });
    const t = addTyping();
    try {
        const reply = await askJULS(txt, []);
        t.remove();
        addMsg(reply, 'bot');
        history.push({ role:'assistant', content: reply });
        if (history.length > 24) history = history.slice(-24);
        speak(reply);
    } catch(e) {
        t.remove();
        addMsg('❌ ' + e.message, 'bot');
    }
}

function addMsg(txt, who) {
    const d = document.createElement('div');
    d.className = 'msg ' + who;
    d.innerHTML = who === 'bot'
        ? `<div class="bot-name">👑 JULS</div>${txt}`
        : txt;
    const msgs = document.getElementById('msgs');
    msgs.appendChild(d);
    d.scrollIntoView({ behavior:'smooth' });
    return d;
}

function addTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = '<div class="bot-name">👑 JULS</div><div class="typing"><span></span><span></span><span></span></div>';
    const msgs = document.getElementById('msgs');
    msgs.appendChild(d);
    d.scrollIntoView({ behavior:'smooth' });
    return d;
}

// ── MIC CHAT ──────────────────────────────────────────
function toggleMic() {
    if (!recog) { alert('Voz no disponible en este navegador'); return; }
    const btn = document.getElementById('btnMic');
    if (listening) { recog.stop(); return; }
    listening = true;
    btn.classList.add('on');
    btn.textContent = '🔴';
    recog.start();
    recog.onresult = e => {
        const t = e.results[0][0].transcript;
        document.getElementById('chatIn').value = t;
        listening = false;
        btn.classList.remove('on');
        btn.textContent = '🎤';
        send();
    };
    recog.onerror = recog.onend = () => {
        listening = false;
        btn.classList.remove('on');
        btn.textContent = '🎤';
    };
}

// ── PANTALLA VOZ ──────────────────────────────────────
function toggleOrb() {
    if (!recog) { alert('Voz no disponible'); return; }
    const orb  = document.getElementById('orb');
    const icon = document.getElementById('orbIcon');
    const stat = document.getElementById('orbStatus');
    const txt  = document.getElementById('orbTxt');
    const resp = document.getElementById('orbResp');
    if (listening) { recog.stop(); return; }
    listening = true;
    orb.className = 'orb listen';
    icon.textContent = '🎙️';
    stat.textContent = 'Escuchando...';
    txt.textContent = '';
    resp.classList.remove('show');
    recog.lang = 'es-MX';
    recog.start();
    recog.onresult = async e => {
        const q = e.results[0][0].transcript;
        txt.textContent = '"' + q + '"';
        listening = false;
        orb.className = 'orb';
        icon.textContent = '⏳';
        stat.textContent = 'Pensando...';
        try {
            const a = await askJULS(q);
            resp.textContent = a;
            resp.classList.add('show');
            orb.className = 'orb speak';
            icon.textContent = '🔊';
            stat.textContent = 'Hablando...';
            const u = new SpeechSynthesisUtterance(a.replace(/[*_#`]/g,'').substring(0,250));
            u.lang = 'es-MX';
            u.rate = 1.0;
            u.onend = () => {
                orb.className = 'orb';
                icon.textContent = '👑';
                stat.textContent = 'Toca para hablar';
            };
            window.speechSynthesis.speak(u);
        } catch(e) {
            orb.className = 'orb';
            icon.textContent = '👑';
            stat.textContent = 'Error: ' + e.message;
        }
    };
    recog.onerror = recog.onend = () => {
        if (listening) {
            listening = false;
            orb.className = 'orb';
            icon.textContent = '👑';
            stat.textContent = 'Toca para hablar';
        }
    };
}

// ── TRADUCTOR ─────────────────────────────────────────
function swapLang() {
    [langFrom, langTo] = [langTo, langFrom];
    const L = { es:'🇲🇽 Español', en:'🇺🇸 Inglés', fr:'🇫🇷 Francés', de:'🇩🇪 Alemán' };
    document.getElementById('lFrom').textContent = L[langFrom] || langFrom;
    document.getElementById('lTo').textContent   = L[langTo]   || langTo;
}

async function translate() {
    const txt = document.getElementById('transIn').value.trim();
    const out = document.getElementById('transOut');
    if (!txt) return;
    out.textContent = '⏳ Traduciendo...';
    const N = { es:'español', en:'inglés', fr:'francés', de:'alemán' };
    try {
        const r = await askJULS(`Traduce de ${N[langFrom]||langFrom} a ${N[langTo]||langTo}. Devuelve SOLO la traducción:\n\n${txt}`, []);
        out.textContent = r;
    } catch(e) { out.textContent = '❌ ' + e.message; }
}

// ── WEB GENERATOR ─────────────────────────────────────
async function genWeb() {
    const desc = document.getElementById('genIn').value.trim();
    const out  = document.getElementById('genOut');
    const btn  = document.getElementById('btnCopy');
    if (!desc) return;
    out.textContent = '⏳ Generando página web...';
    out.classList.add('show');
    btn.classList.remove('show');
    try {
        const r = await askJULS(`Genera HTML completo (CSS incluido, una sola página) para: ${desc}. Diseño oscuro profesional responsive. Colores DATESEG MX: rojo #c8102e, verde #006847. Devuelve SOLO el código HTML, sin explicaciones ni backticks.`, []);
        out.textContent = r;
        btn.classList.add('show');
    } catch(e) { out.textContent = '❌ ' + e.message; }
}

function copyCode() {
    navigator.clipboard.writeText(document.getElementById('genOut').textContent);
    const b = document.getElementById('btnCopy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => b.textContent = '📋 Copiar código', 2000);
}

// ── ANTI-FRAUDE ───────────────────────────────────────
async function checkFraud() {
    const phone = document.getElementById('fraudPhone').value.trim();
    const msg   = document.getElementById('fraudMsg').value.trim();
    const res   = document.getElementById('fraudRes');
    if (!phone && !msg) return;
    res.className = 'fraud-res show warn';
    res.textContent = '⏳ Analizando...';
    try {
        const r = await askJULS(`Analiza si es fraude o estafa en México. Número: ${phone||'N/A'}. Mensaje: ${msg||'Solo número'}. Responde: VEREDICTO (SEGURO/SOSPECHOSO/PELIGROSO), RIESGO %, RAZONES, RECOMENDACIÓN. Sé directo y breve.`, []);
        const up = r.toUpperCase();
        res.className = 'fraud-res show ' + (up.includes('PELIGROSO') ? 'danger' : up.includes('SOSPECHOSO') ? 'warn' : 'safe');
        res.textContent = r;
        fraudHist.unshift({ phone: phone||'N/A', v: up.includes('PELIGROSO') ? '🔴' : up.includes('SOSPECHOSO') ? '🟡' : '🟢', f: new Date().toLocaleTimeString('es-MX') });
        if (fraudHist.length > 10) fraudHist = fraudHist.slice(0,10);
        localStorage.setItem('juls_fh', JSON.stringify(fraudHist));
        loadFraudHist();
    } catch(e) {
        res.className = 'fraud-res show warn';
        res.textContent = '❌ ' + e.message;
    }
}

function loadFraudHist() {
    if (!fraudHist.length) return;
    document.getElementById('histCard').style.display = 'block';
    document.getElementById('histList').innerHTML = fraudHist.map(f =>
        `<div class="hist-item"><span>${f.phone}</span><span>${f.v} ${f.f}</span></div>`
    ).join('');
}
</script>
</body>
</html>
